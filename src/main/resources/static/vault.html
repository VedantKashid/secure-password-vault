<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 My Vault - Secure Password Vault</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container dashboard">
    <div class="header-actions">
        <div>
            <h2>🔐 My Vault</h2>
            <p style="margin: 5px 0 0 0; color: #a0a0a0; font-size: 14px;">Welcome back, stay secure!</p>
        </div>
        <button onclick="logout()" class="danger small">
            🚪 Logout
        </button>
    </div>

    <div class="action-row">
        <input
                type="text"
                id="searchInput"
                placeholder="🔍 Search your passwords..."
        >
        <button onclick="loadPasswords()" class="secondary small">
            🔎 Search
        </button>
        <button onclick="scanBreaches()" class="warning small">
            ⚠️ Scan Breaches
        </button>
    </div>

    <div class="add-password-form">
        <h3>➕ Add / Edit Password</h3>

        <input
                type="text"
                id="newPlatform"
                placeholder="🌐 Platform (e.g., Netflix, Gmail)"
        >

        <input
                type="text"
                id="newUsername"
                placeholder="👤 Username / Email Address"
        >

        <div class="password-input-group">
            <input
                    type="text"
                    id="newPassword"
                    placeholder="🔑 Password"
            >
            <button onclick="generateRandom()" class="small" title="Generate a secure password">
                ⚡ Generate
            </button>
        </div>

        <button id="saveBtn" onclick="saveNewPassword()" class="success" style="margin-top: 10px;">
            💾 Save to Vault
        </button>
    </div>

    <div id="vaultList" style="margin-top: 30px;">
        <div class="empty-state">
            <div class="empty-state-icon">🔍</div>
            <p>Loading your vault...</p>
        </div>
    </div>
</div>

<div id="toast"></div>

<script src="js/api.js"></script>
<script src="js/vault.js"></script>
</body>
</html>
